<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Fant ikke siden · Builtly</title>
<script>
/* Auto-reparasjon av videresendte lenker. Meldings-/e-postapper ødelegger
   lenker på mange måter: «?» → «%3F», autokorrektur («sundsoya» → «sundsøya»),
   store bokstaver, avkuttet query. Strategi:
   1) %3F → ? og hopp dit.
   2) Ligner stien på en prospekt-lenke (etter normalisering ø→o osv.):
      gjenkjenn boknavnet i lenken og hopp RETT til riktig salgsoppgave —
      ellers til prospekt-oversikten. Målet HEAD-sjekkes først så vi aldri
      redirecter inn i en ny 404. */
(function () {
  try {
    var raw = window.location.pathname + window.location.search;
    if (/%3F/i.test(raw)) {
      window.location.replace(raw.replace(/%3F/i, "?"));
      return;
    }
    var p = raw;
    try { p = decodeURIComponent(raw); } catch (e) {}
    var low = p.toLowerCase().replace(/ø/g, "o").replace(/å/g, "a").replace(/æ/g, "ae");
    var m = low.match(/prospekt[\/-]?([a-z0-9-]+)/);
    if (!m) return;
    var base = "/prospekt/" + m[1] + "/";
    var bm = low.match(/(leilighet|leil|rekkehus|enebolig)/);
    var book = bm ? (bm[1].indexOf("leil") === 0 ? "leil"
                     : bm[1] === "rekkehus" ? "rekkehus" : "eneboliger") : "";
    var target = book ? base + "les.html?b=" + book : base;
    fetch(base, { method: "HEAD" }).then(function (r) {
      if (r.ok) { window.location.replace(target); }
    }).catch(function () {});
  } catch (e) {}
})();
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:radial-gradient(900px 420px at 25% -10%, #12283d 0%, #0b1420 60%);
       color:#e7edf3;font:16px/1.65 -apple-system,'Segoe UI',Roboto,sans-serif;padding:24px}
  .card{max-width:460px;text-align:center;background:rgba(13,24,36,.72);
        border:1px solid rgba(120,145,170,.18);border-radius:18px;
        padding:44px 36px;box-shadow:0 22px 60px rgba(0,0,0,.35)}
  .code{font-size:12px;letter-spacing:.3em;color:#7dd3fc;font-weight:800}
  h1{font-size:25px;margin:10px 0 8px;font-weight:800}
  p{color:#9fb0c3;font-size:14.5px}
  .btns{margin-top:26px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  a.btn{display:inline-block;padding:12px 22px;border-radius:999px;text-decoration:none;
        font-weight:700;font-size:14px}
  .primary{background:#38bdf8;color:#08131e}
  .ghost{border:1px solid rgba(120,145,170,.4);color:#cfe3f5}
</style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>Fant ikke siden</h1>
    <p>Lenken kan være skrevet feil eller ha blitt endret da den ble delt.
       <span lang="en">The page could not be found — the link may have been
       altered when it was shared.</span></p>
    <div class="btns">
      <a class="btn ghost" href="https://builtly.ai/">builtly.ai</a>
    </div>
  </div>
<script>
/* Kontekst-hjelp (fallback om auto-hoppet ikke tar): på alt som LIGNER en
   prospekt-sti (samme normalisering som over) vises veien til oversikten. */
(function () {
  try {
    var p = window.location.pathname;
    try { p = decodeURIComponent(p); } catch (e) {}
    var low = p.toLowerCase().replace(/ø/g, "o").replace(/å/g, "a").replace(/æ/g, "ae");
    var m = low.match(/prospekt[\/-]?([a-z0-9-]+)/);
    if (m) {
      var a = document.createElement("a");
      a.className = "btn primary";
      a.href = "/prospekt/" + m[1] + "/";
      a.textContent = "Til prospektene ›";
      var btns = document.querySelector(".btns");
      btns.insertBefore(a, btns.firstChild);
    }
  } catch (e) {}
})();
</script>
</body>
</html>
